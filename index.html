<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toko Elektronik</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background-color:#f5f7fa;
}

.header{
    background: linear-gradient(to right,#4facfe,#00c6ff);
    color:white;
    text-align:center;
    padding:25px;
}

.form-card{
    max-width:700px;
    margin:auto;
    margin-top:30px;
    border-radius:15px;
    box-shadow:0 4px 8px rgba(0,0,0,0.2);
}

.hasil-card{
    max-width:700px;
    margin:auto;
    margin-top:20px;
    border-radius:15px;
    background:#f8f9fa;
    display:none;
}
</style>
</head>

<body>

<div class="header">
    <h2>Selamat Datang di Toko Elektronik</h2>
    <p>Belanja lebih mudah dengan perhitungan otomatis</p>
</div>

<div class="container">

    <div class="card form-card p-4">
        <h3 class="text-center mb-4">Form Transaksi</h3>

        <div class="mb-3">
            <label>Nama Pelanggan</label>
            <input type="text" id="nama" class="form-control">
        </div>

        <div class="mb-3">
            <label>Nama Produk</label>
            <input type="text" id="produk" class="form-control">
        </div>

        <div class="mb-3">
            <label>Harga Produk</label>
            <input type="number" id="harga" class="form-control">
        </div>

        <div class="mb-3">
            <label>Jumlah Pembelian</label>
            <input type="number" id="jumlah" class="form-control">
        </div>

        <button class="btn btn-success" onclick="hitung()">
            Hitung
        </button>

        <button class="btn btn-danger" onclick="resetForm()">
            Reset
        </button>
    </div>

    <div class="card hasil-card p-4" id="hasil">
        <h3>Hasil Perhitungan</h3>

        <p><b>Nama Pelanggan :</b> <span id="hasilNama"></span></p>

        <p><b>Nama Produk :</b> <span id="hasilProduk"></span></p>

        <p><b>Total Belanja :</b> <span id="totalBelanja"></span></p>

        <p><b>Potongan :</b> <span id="potongan"></span></p>

        <p><b>Total Bayar :</b> <span id="totalBayar"></span></p>
    </div>

</div>

<script>

function formatRupiah(angka){
    return "Rp " + angka.toLocaleString("id-ID");
}

function hitung(){

    let nama = document.getElementById("nama").value;
    let produk = document.getElementById("produk").value;
    let harga = parseInt(document.getElementById("harga").value);
    let jumlah = parseInt(document.getElementById("jumlah").value);

    if(nama=="" || produk=="" || isNaN(harga) || isNaN(jumlah)){
        alert("Semua input wajib diisi!");
        return;
    }

    let totalBelanja = harga * jumlah;

    let potongan = 0;

    if(totalBelanja >= 400000){
        potongan = 50000;
    }

    let totalBayar = totalBelanja - potongan;

    document.getElementById("hasilNama").innerHTML = nama;
    document.getElementById("hasilProduk").innerHTML = produk;

    document.getElementById("totalBelanja").innerHTML =
        formatRupiah(totalBelanja);

    document.getElementById("potongan").innerHTML =
        formatRupiah(potongan);

    document.getElementById("totalBayar").innerHTML =
        formatRupiah(totalBayar);

    document.getElementById("hasil").style.display = "block";
}

function resetForm(){

    document.getElementById("nama").value = "";
    document.getElementById("produk").value = "";
    document.getElementById("harga").value = "";
    document.getElementById("jumlah").value = "";

    document.getElementById("hasil").style.display = "none";
}

</script>

</body>
</html>
